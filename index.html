<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>HY 3D Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:black;
}

#menu{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:10;
}

button{

padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
background:#222;
color:white;
font-size:14px;
cursor:pointer;

}

button:hover{
background:#444;
}

#viewer3d{
width:100%;
height:100vh;
}

#arMarker{
display:none;
}

</style>

<script>

function show3D(){

document.getElementById("viewer3d").style.display="block";
document.getElementById("arMarker").style.display="none";

}

function showMarkerAR(){

document.getElementById("viewer3d").style.display="none";
document.getElementById("arMarker").style.display="block";

}

</script>

</head>

<body>

<div id="menu">

<button onclick="show3D()">3D Görüntüle</button>

<button onclick="document.getElementById('model').activateAR()">AR Başlat</button>

<button onclick="showMarkerAR()">Marker AR</button>

</div>


<!-- 3D MODEL -->

<model-viewer
id="model"
src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/maket.github.io@main/model.glb"

camera-controls
auto-rotate

ar
ar-modes="scene-viewer webxr"

loading="lazy"
reveal="interaction"

shadow-intensity="0.8"

environment-image="neutral"

style="width:100%;height:100vh;">

</model-viewer>



<!-- MARKER AR -->

<div id="arMarker">

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled:false;"

vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-marker type="pattern" url="marker.patt">

<a-entity
gltf-model="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/oyunoyun.github.io@main/model.glb?v=2"
scale="0.5 0.5 0.5">

</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</div>

</body>
</html>
